name: Utopia NW Snapshot

# Runs 5 minutes past every hour to collect world dump data.
# Writes one Firestore document per KD to kd_nw_history/{loc}_{hourId}.
# Also cleans up documents older than the age start date set in the tool.

on:
  schedule:
    - cron: '5 * * * *'   # :05 past every hour, every day
  workflow_dispatch:        # allow manual run from GitHub Actions UI

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run snapshot
        run: node scripts/snapshot.js
        env:
          FB_PROJECT:      utopia-leaderboard
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}
